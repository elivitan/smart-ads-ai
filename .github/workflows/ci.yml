name: Smart Ads AI - CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Preflight + Test Flows
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run Preflight checks
        run: node preflight.cjs

      - name: Run Test Flows
        run: node test-flows.cjs

      - name: Run Resilience Tests
        run: node tests/resilience.test.cjs

  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests (smoke)
        run: npx playwright test tests/health-api.spec.cjs tests/api-routes.spec.cjs
        env:
          TEST_PORT: 3457
        continue-on-error: true

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7

  notify:
    name: Slack Notification
    runs-on: ubuntu-latest
    needs: [test, e2e]
    if: always() && github.ref == 'refs/heads/main'

    steps:
      - name: Notify on failure
        if: needs.test.result == 'failure' || needs.e2e.result == 'failure'
        run: |
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
              -H 'Content-type: application/json' \
              -d '{
                "text": "🚨 *Smart Ads AI CI Failed*\nBranch: `main`\nCommit: `${{ github.sha }}`\nAuthor: ${{ github.actor }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              }'
            echo "Slack notification sent"
          else
            echo "SLACK_WEBHOOK_URL not configured — skipping notification"
          fi

      - name: Notify on success
        if: needs.test.result == 'success' && (needs.e2e.result == 'success' || needs.e2e.result == 'skipped')
        run: |
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
              -H 'Content-type: application/json' \
              -d '{
                "text": "✅ *Smart Ads AI CI Passed*\nBranch: `main`\nCommit: `${{ github.sha }}`"
              }'
          fi

name: Smart Ads AI - CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Preflight + Test Flows
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run Preflight checks
        run: node preflight.cjs

      - name: Run Test Flows
        run: node test-flows.cjs

      - name: Run Resilience Tests
        run: node tests/resilience.test.cjs
